<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Breathe — Legal</title>
    <meta name="description" content="Legal documents for the Breathe breathwork app." />
    <meta name="robots" content="index,follow" />
    <style>
      :root { --bg:#0d0720; --card:#150c2e; --text:#f3f1f9; --muted:#b8b2c6; --accent:#b9a7ff; --line:rgba(255,255,255,.1); }
      * { box-sizing: border-box; }
      body { margin:0; background:var(--bg); color:var(--text); font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif; line-height:1.65; }
      .wrap { max-width:640px; margin:0 auto; padding:48px 22px 80px; }
      h1 { font-size:30px; margin:6px 0 10px; }
      p { color:var(--muted); }
      a { color:var(--accent); }
      .links { display:flex; flex-direction:column; gap:12px; margin-top:24px; }
      .links a { display:block; background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px 18px; text-decoration:none; font-weight:600; }
      .links a:hover { border-color:var(--accent); }
      footer { margin-top:40px; color:var(--muted); font-size:13px; border-top:1px solid var(--line); padding-top:16px; }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>Breathe — Legal</h1>
      <p>Privacy and terms for the Breathe breathwork app.</p>
      <div class="links">
        <a href="privacy.html">Privacy Policy &rarr;</a>
        <a href="terms.html">Terms of Service &rarr;</a>
      </div>
      <footer>&copy; 2026 Humberto Pedraza</footer>
    </main>
  </body>
</html>
