<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset your password — Breathe</title>
    <meta name="description" content="Set a new password for your Breathe account." />
    <meta name="robots" content="noindex,nofollow" />
    <link rel="icon" href="/favicon.ico" />
    <style>
      :root { --bg:#0d0720; --card:#150c2e; --text:#f3f1f9; --muted:#b8b2c6; --accent:#b9a7ff; --line:rgba(255,255,255,.1); --err:#ff8a8a; --ok:#9be3a8; }
      * { box-sizing: border-box; }
      body { margin:0; background:var(--bg); color:var(--text); font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif; line-height:1.6; }
      .wrap { max-width:460px; margin:0 auto; padding:48px 22px 80px; }
      h1 { font-size:26px; margin:6px 0 6px; }
      p { color:var(--muted); }
      .card { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:22px; margin-top:18px; }
      label { display:block; color:var(--muted); font-size:13px; margin:14px 0 6px; }
      input { width:100%; background:#0f0a24; border:1px solid var(--line); border-radius:10px; padding:12px 14px; color:#fff; font-size:16px; }
      button { width:100%; margin-top:20px; padding:13px 16px; border:none; border-radius:12px; font-size:16px; font-weight:600; color:#fff; cursor:pointer; background:linear-gradient(135deg,#7c5cff,#b9a7ff); }
      button:disabled { opacity:.6; cursor:default; }
      .msg { margin-top:14px; font-size:14px; }
      .msg.err { color:var(--err); }
      .msg.ok { color:var(--ok); }
      .hidden { display:none; }
      a { color:var(--accent); }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>Reset your password</h1>
      <p id="intro">Verifying your reset link…</p>

      <div class="card">
        <form id="form" class="hidden">
          <label for="password">New password</label>
          <input id="password" type="password" autocomplete="new-password" placeholder="At least 6 characters" />
          <label for="confirm">Confirm new password</label>
          <input id="confirm" type="password" autocomplete="new-password" placeholder="Re-enter your password" />
          <button id="submit" type="submit">Set new password</button>
          <p id="formMsg" class="msg"></p>
        </form>
        <p id="done" class="msg ok hidden">
          Your password has been updated. Return to the Breathe app (or website) and sign in with your new password.
        </p>
        <p id="fatal" class="msg err hidden"></p>
      </div>
    </main>

    <script type="module">
      // Public project values (anon key is safe to ship — it's already in the app bundle).
      const SUPABASE_URL = 'https://bcwipilhtajtplfcgill.supabase.co'
      const SUPABASE_ANON_KEY =
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJjd2lwaWxodGFqdHBsZmNnaWxsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAyMjI2OTksImV4cCI6MjA5NTc5ODY5OX0.d83OKn2OyuUPA7T6nmFnIMiYe-QLmVqMJPBuiSWtwnA'

      const intro = document.getElementById('intro')
      const form = document.getElementById('form')
      const done = document.getElementById('done')
      const fatal = document.getElementById('fatal')
      const formMsg = document.getElementById('formMsg')
      const submitBtn = document.getElementById('submit')

      function showFatal(text) {
        intro.classList.add('hidden')
        form.classList.add('hidden')
        fatal.textContent = text
        fatal.classList.remove('hidden')
      }

      try {
        const { createClient } = await import('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm')
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
          auth: { detectSessionInUrl: true, persistSession: false, autoRefreshToken: false },
        })

        // A valid recovery link establishes a temporary session (from the URL hash,
        // or a ?code= param on PKCE links). Wait for it before showing the form.
        let ready = false
        const reveal = () => {
          if (ready) return
          ready = true
          intro.textContent = 'Choose a new password for your Breathe account.'
          form.classList.remove('hidden')
        }

        supabase.auth.onAuthStateChange((event, session) => {
          if (event === 'PASSWORD_RECOVERY' || session) reveal()
        })

        // Fallback for PKCE-style links that carry a ?code= query param.
        const params = new URLSearchParams(window.location.search)
        if (params.get('code')) {
          try {
            await supabase.auth.exchangeCodeForSession(window.location.href)
          } catch {
            /* handled by the session check below */
          }
        }

        const { data } = await supabase.auth.getSession()
        if (data.session) reveal()

        // If nothing established a session shortly after load, the link is bad/expired.
        setTimeout(() => {
          if (!ready) {
            showFatal(
              'This reset link is invalid or has expired. Request a new one from the app: Account → Forgot password.',
            )
          }
        }, 2500)

        form.addEventListener('submit', async (e) => {
          e.preventDefault()
          formMsg.textContent = ''
          formMsg.className = 'msg'
          const password = document.getElementById('password').value
          const confirm = document.getElementById('confirm').value
          if (password.length < 6) {
            formMsg.textContent = 'Password must be at least 6 characters.'
            formMsg.classList.add('err')
            return
          }
          if (password !== confirm) {
            formMsg.textContent = 'Passwords do not match.'
            formMsg.classList.add('err')
            return
          }
          submitBtn.disabled = true
          submitBtn.textContent = 'Saving…'
          const { error } = await supabase.auth.updateUser({ password })
          if (error) {
            formMsg.textContent = error.message || 'Could not update password. Try requesting a new link.'
            formMsg.classList.add('err')
            submitBtn.disabled = false
            submitBtn.textContent = 'Set new password'
            return
          }
          await supabase.auth.signOut()
          form.classList.add('hidden')
          intro.classList.add('hidden')
          done.classList.remove('hidden')
        })
      } catch (err) {
        showFatal('Something went wrong loading the reset page. Please try the link again later.')
      }
    </script>
  </body>
</html>
